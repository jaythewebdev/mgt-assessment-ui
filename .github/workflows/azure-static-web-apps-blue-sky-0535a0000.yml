name: Deploy Frontend to Azure Static Web Apps

on:
  push:
    branches:
      - main
      - master
    paths:
      - "src/**"
      - "public/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "vite.config.js"
      - ".env"
      - ".github/workflows/azure-static-web-apps-blue-sky-0535a0000.yml"
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
      - master
    paths:
      - "src/**"
      - "public/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "vite.config.js"
      - ".env"
      - ".github/workflows/azure-static-web-apps-blue-sky-0535a0000.yml"

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    name: Build and Deploy
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: Build frontend (using GitHub variable)
        if: ${{ vars.VITE_LEAD_FOLLOWUP_BASE_URL != '' }}
        env:
          VITE_LEAD_FOLLOWUP_BASE_URL: ${{ vars.VITE_LEAD_FOLLOWUP_BASE_URL }}
        run: npm run build

      - name: Build frontend (using .env)
        if: ${{ vars.VITE_LEAD_FOLLOWUP_BASE_URL == '' }}
        run: npm run build

      - name: Deploy to Azure Static Web Apps
        id: deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "dist"
          output_location: ""
          skip_app_build: true

  close_pull_request_preview:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Preview
    steps:
      - name: Close preview environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "close"
